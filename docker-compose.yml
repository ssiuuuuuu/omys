services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omys}
      POSTGRES_USER: ${POSTGRES_USER:-omys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omys-local-password}
    ports:
      - "5432:5432"
    volumes:
      - omys-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-omys}:${POSTGRES_PASSWORD:-omys-local-password}@db:5432/${POSTGRES_DB:-omys}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      FRONTEND_URL: http://localhost:8080
      PLACES_PROVIDER: ${PLACES_PROVIDER:-mock}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-before-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_KAKAO_JAVASCRIPT_KEY: ${VITE_KAKAO_JAVASCRIPT_KEY:-}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  omys-postgres:
