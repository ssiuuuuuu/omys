services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omys}
      POSTGRES_USER: ${POSTGRES_USER:-omys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - omys-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-omys}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-omys}
      CORS_ORIGINS: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN must be set}
      FRONTEND_URL: ${PUBLIC_ORIGIN}
      PLACES_PROVIDER: ${PLACES_PROVIDER:-kakao}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY must be set}
      MIN_STAY_MINUTES: ${MIN_STAY_MINUTES:-60}
      SEARCH_CACHE_SECONDS: ${SEARCH_CACHE_SECONDS:-180}
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""
        VITE_KAKAO_JAVASCRIPT_KEY: ${VITE_KAKAO_JAVASCRIPT_KEY:-}
    restart: unless-stopped
    ports:
      # Cloudflare Tunnel reaches the app locally; do not expose it on every interface.
      - "127.0.0.1:${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  omys-postgres:
